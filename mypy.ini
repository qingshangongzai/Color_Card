# MyPy configuration file
# Does not affect runtime behavior

[mypy]
python_version = 3.11
show_error_codes = True

# Third-party libraries without stubs or py.typed marker
[mypy-qfluentwidgets.*]
ignore_missing_imports = True

[mypy-qframelesswindow.*]
ignore_missing_imports = True

[mypy-win32con.*]
ignore_missing_imports = True

[mypy-win32gui.*]
ignore_missing_imports = True

[mypy-win32com.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

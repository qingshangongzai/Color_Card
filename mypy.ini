# MyPy configuration file
# Strategy: lower strictness, only check functions with type annotations

[mypy]
python_version = 3.11
show_error_codes = True

# Do not require all functions to have type annotations
disallow_untyped_defs = False

# Do not check bodies of untyped functions (avoids false positives for
# common patterns like None-initialized cache variables)
check_untyped_defs = False

# Third-party libraries without stubs or py.typed marker
[mypy-qfluentwidgets.*]
ignore_missing_imports = True

[mypy-qframelesswindow.*]
ignore_missing_imports = True

[mypy-win32con.*]
ignore_missing_imports = True

[mypy-win32gui.*]
ignore_missing_imports = True

[mypy-win32com.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

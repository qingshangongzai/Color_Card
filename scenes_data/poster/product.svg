<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#f5f5f5"/>

  <!-- 左侧产品展示区 -->
  <rect id="product-bg" class="secondary" x="30" y="40" width="180" height="220" rx="8" fill="#ffffff"/>
  <rect id="product-shadow" class="background" x="35" y="220" width="170" height="10" rx="5" fill="#e0e0e0" opacity="0.5"/>

  <!-- 产品主体 -->
  <rect id="product-body" class="primary" x="80" y="80" width="80" height="120" rx="8" fill="#2d3436"/>
  <rect id="product-screen" class="background" x="90" y="95" width="60" height="80" rx="4" fill="#ffffff"/>
  <rect id="product-button" class="accent" cx="120" cy="190" width="20" height="4" rx="2" fill="#ff6b6b"/>

  <!-- 产品装饰 -->
  <circle id="product-deco-1" class="accent" cx="100" cy="115" r="8" fill="#ff6b6b"/>
  <rect id="product-deco-2" class="secondary" x="115" y="108" width="25" height="6" rx="2" fill="#b2bec3"/>
  <rect id="product-deco-3" class="secondary" x="115" y="118" width="20" height="6" rx="2" fill="#b2bec3"/>

  <!-- 右侧内容区 -->
  <text id="brand-name" class="text" x="240" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#636e72" data-fixed-color="black">科技品牌</text>

  <text id="product-name" class="text" x="240" y="95" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2d3436" data-fixed-color="black">智能</text>
  <text id="product-name-2" class="accent" x="240" y="125" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#ff6b6b" data-fixed-color="black">设备 X</text>

  <!-- 卖点列表 -->
  <g id="feature-1">
    <circle id="feature-icon-1" class="accent" cx="250" cy="155" r="6" fill="#ff6b6b"/>
    <rect id="feature-text-1" class="primary" x="265" y="152" width="100" height="6" rx="2" fill="#b2bec3"/>
  </g>

  <g id="feature-2">
    <circle id="feature-icon-2" class="accent" cx="250" cy="175" r="6" fill="#ff6b6b"/>
    <rect id="feature-text-2" class="primary" x="265" y="172" width="90" height="6" rx="2" fill="#b2bec3"/>
  </g>

  <g id="feature-3">
    <circle id="feature-icon-3" class="accent" cx="250" cy="195" r="6" fill="#ff6b6b"/>
    <rect id="feature-text-3" class="primary" x="265" y="192" width="110" height="6" rx="2" fill="#b2bec3"/>
  </g>

  <!-- 价格区 -->
  <text id="price-label" class="secondary" x="240" y="235" font-family="Arial, sans-serif" font-size="10" fill="#636e72" data-fixed-color="black">起售价</text>
  <text id="price-value" class="text" x="240" y="260" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2d3436" data-fixed-color="black">¥2,199</text>
  <text id="price-old" class="secondary" x="330" y="255" font-family="Arial, sans-serif" font-size="12" fill="#b2bec3" data-fixed-color="black">¥2,999</text>
  <line id="price-strike" x1="325" y1="250" x2="355" y2="250" stroke="#b2bec3" stroke-width="1"/>

  <!-- 购买按钮 -->
  <rect id="buy-btn" class="accent" x="240" y="270" width="120" height="25" rx="4" fill="#ff6b6b"/>
  <text id="buy-text" class="text" x="300" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" data-fixed-color="black">立即购买</text>

  <!-- 底部装饰 -->
  <rect id="bottom-accent" class="accent" x="0" y="290" width="400" height="10" fill="#ff6b6b"/>
</svg>

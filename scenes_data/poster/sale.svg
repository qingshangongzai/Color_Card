<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect id="background" class="background" width="400" height="300" fill="#fff5f5"/>

  <path id="banner" class="accent" d="M 0 0 L 400 0 L 400 80 L 200 110 L 0 80 Z" fill="#e74c3c"/>

  <text id="sale-text" class="text" x="200" y="55" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" data-fixed-color="black">SALE</text>

  <circle id="badge-outer" class="primary" cx="320" cy="180" r="50" fill="#c0392b"/>
  <circle id="badge-inner" class="accent" cx="320" cy="180" r="40" fill="#e74c3c"/>

  <text id="discount" class="text" x="320" y="175" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" data-fixed-color="black">50%</text>
  <text id="off-text" class="text" x="320" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" data-fixed-color="black">OFF</text>

  <rect id="tag-1" class="secondary" x="40" y="140" width="80" height="30" rx="4" fill="#2c3e50"/>
  <text id="tag-1-text" class="text" x="80" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" data-fixed-color="black">限时特惠</text>

  <rect id="tag-2" class="primary" x="40" y="180" width="80" height="30" rx="4" fill="#34495e"/>
  <text id="tag-2-text" class="text" x="80" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" data-fixed-color="black">全场包邮</text>

  <rect id="price-box" class="accent" x="150" y="220" width="100" height="40" rx="5" fill="#e74c3c"/>
  <text id="price" class="text" x="200" y="247" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" data-fixed-color="black">¥99起</text>

  <rect id="button" class="primary" x="130" y="270" width="140" height="25" rx="12" fill="#2c3e50"/>
  <text id="button-text" class="text" x="200" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" data-fixed-color="black">立即抢购</text>

  <circle id="deco-1" class="accent" cx="30" cy="250" r="6" fill="#e74c3c"/>
  <circle id="deco-2" class="primary" cx="50" cy="270" r="4" fill="#34495e"/>
  <circle id="deco-3" class="accent" cx="370" cy="240" r="5" fill="#e74c3c"/>
  <circle id="deco-4" class="primary" cx="385" cy="260" r="3" fill="#34495e"/>

  <line id="strike-1" class="secondary" x1="160" y1="200" x2="240" y2="200" stroke="#95a5a6" stroke-width="2"/>
  <text id="original-price" class="secondary" x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#95a5a6" data-fixed-color="black">¥199</text>
</svg>
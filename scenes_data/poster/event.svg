<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#f8f9fa"/>

  <!-- 顶部装饰条 -->
  <rect id="top-bar" class="primary" x="0" y="0" width="400" height="60" fill="#2d3436"/>

  <!-- 活动类型标签 -->
  <rect id="event-tag" class="accent" x="30" y="20" width="80" height="25" rx="4" fill="#ff6b6b"/>
  <text id="event-type" class="text" x="70" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" data-fixed-color="black">会议</text>

  <!-- 主标题 -->
  <text id="main-title" class="text" x="30" y="100" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#2d3436" data-fixed-color="black">设计</text>
  <text id="sub-title" class="accent" x="30" y="135" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ff6b6b" data-fixed-color="black">峰会 2026</text>

  <!-- 分隔线 -->
  <line id="divider" class="secondary" x1="30" y1="155" x2="200" y2="155" stroke="#b2bec3" stroke-width="2"/>

  <!-- 活动详情 -->
  <g id="date-info">
    <circle id="date-icon" class="accent" cx="45" cy="180" r="12" fill="#ff6b6b"/>
    <text id="date-text" class="text" x="65" y="185" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" data-fixed-color="black">2026年3月20-22日</text>
  </g>

  <g id="time-info">
    <circle id="time-icon" class="primary" cx="45" cy="210" r="12" fill="#2d3436"/>
    <text id="time-text" class="text" x="65" y="215" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" data-fixed-color="black">上午9:00 - 下午6:00</text>
  </g>

  <g id="location-info">
    <circle id="location-icon" class="secondary" cx="45" cy="240" r="12" fill="#636e72"/>
    <text id="location-text" class="text" x="65" y="245" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" data-fixed-color="black">上海国际会议中心</text>
  </g>

  <!-- 右侧视觉元素 -->
  <rect id="visual-box" class="secondary" x="240" y="80" width="150" height="180" rx="8" fill="#ffffff"/>
  <rect id="visual-header" class="primary" x="240" y="80" width="150" height="40" rx="8" fill="#2d3436"/>
  <text id="visual-title" class="text" x="315" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" data-fixed-color="black">演讲嘉宾</text>

  <!-- 演讲者头像占位 -->
  <circle id="speaker-1" class="accent" cx="275" cy="150" r="20" fill="#ff6b6b"/>
  <circle id="speaker-2" class="primary" cx="315" cy="150" r="20" fill="#2d3436"/>
  <circle id="speaker-3" class="secondary" cx="355" cy="150" r="20" fill="#636e72"/>

  <!-- 演讲者名字 -->
  <rect id="name-1" class="primary" x="255" y="180" width="40" height="6" rx="2" fill="#b2bec3"/>
  <rect id="name-2" class="primary" x="295" y="180" width="40" height="6" rx="2" fill="#b2bec3"/>
  <rect id="name-3" class="primary" x="335" y="180" width="40" height="6" rx="2" fill="#b2bec3"/>

  <!-- 注册按钮 -->
  <rect id="register-btn" class="accent" x="265" y="210" width="100" height="35" rx="6" fill="#ff6b6b"/>
  <text id="register-text" class="text" x="315" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" data-fixed-color="black">立即报名</text>

  <!-- 底部信息 -->
  <text id="footer-web" class="text" x="315" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72" data-fixed-color="black">www.designsummit.cn</text>
</svg>

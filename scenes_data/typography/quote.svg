<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#fafafa"/>

  <!-- 引用块背景 -->
  <rect id="quote-bg" class="secondary" x="50" y="60" width="500" height="180" rx="8" fill="#f0f0f0"/>

  <!-- 左侧强调条 -->
  <rect id="quote-bar" class="accent" x="50" y="60" width="6" height="180" rx="3" fill="#ff6b6b"/>

  <!-- 引号装饰 - 左上 -->
  <text id="quote-open" class="accent" x="80" y="110" font-family="Georgia, serif" font-size="60" fill="#ff6b6b" opacity="0.5">"</text>

  <!-- 引用内容行 -->
  <rect id="quote-line-1" class="primary" x="110" y="100" width="400" height="8" rx="2" fill="#333333"/>
  <rect id="quote-line-2" class="primary" x="110" y="118" width="420" height="8" rx="2" fill="#333333"/>
  <rect id="quote-line-3" class="primary" x="110" y="136" width="380" height="8" rx="2" fill="#333333"/>
  <rect id="quote-line-4" class="primary" x="110" y="154" width="400" height="8" rx="2" fill="#333333"/>
  <rect id="quote-line-5" class="primary" x="110" y="172" width="350" height="8" rx="2" fill="#333333"/>

  <!-- 引号装饰 - 右下 -->
  <text id="quote-close" class="accent" x="480" y="200" font-family="Georgia, serif" font-size="60" fill="#ff6b6b" opacity="0.5">"</text>

  <!-- 作者信息 -->
  <text id="author-name" class="text" x="300" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a" data-fixed-color="black">— 保罗·兰德</text>
  <text id="author-title" class="secondary" x="300" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888" data-fixed-color="black">著名平面设计师</text>

  <!-- 顶部装饰线 -->
  <line id="top-line" class="accent" x1="200" y1="30" x2="400" y2="30" stroke="#ff6b6b" stroke-width="2"/>

  <!-- 底部装饰点 -->
  <circle id="deco-dot-1" class="accent" cx="280" cy="30" r="3" fill="#ff6b6b"/>
  <circle id="deco-dot-2" class="secondary" cx="300" cy="30" r="3" fill="#cccccc"/>
  <circle id="deco-dot-3" class="accent" cx="320" cy="30" r="3" fill="#ff6b6b"/>
</svg>

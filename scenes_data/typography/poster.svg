<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#1a1a1a"/>
  
  <!-- 装饰圆环 -->
  <circle id="deco-ring" class="accent" cx="320" cy="60" r="40" fill="none" stroke="#ff6b6b" stroke-width="3"/>
  <circle id="deco-dot" class="accent" cx="320" cy="60" r="8" fill="#ff6b6b"/>
  
  <!-- 左侧装饰条 -->
  <rect id="left-bar-1" class="primary" x="30" y="40" width="6" height="80" rx="3" fill="#ffffff"/>
  <rect id="left-bar-2" class="secondary" x="42" y="60" width="6" height="60" rx="3" fill="#cccccc"/>
  <rect id="left-bar-3" class="accent" x="54" y="80" width="6" height="40" rx="3" fill="#ff6b6b"/>
  
  <!-- 主标题 - 大号文字 -->
  <text id="title-line-1" class="text" x="200" y="130" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" data-fixed-color="black">CREATE</text>
  <text id="title-line-2" class="accent" x="200" y="185" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#ff6b6b" data-fixed-color="black">BOLD</text>
  
  <!-- 副标题 -->
  <text id="subtitle" class="secondary" x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" data-fixed-color="black">Design Conference 2026</text>
  
  <!-- 底部信息 -->
  <rect id="bottom-bar" class="primary" x="100" y="245" width="200" height="2" rx="1" fill="#ffffff"/>
  <text id="date-info" class="text" x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" data-fixed-color="black">MARCH 15-17 · SHANGHAI</text>
  
  <!-- 右下角装饰 -->
  <rect id="corner-deco-1" class="accent" x="340" y="240" width="30" height="30" rx="4" fill="#ff6b6b"/>
  <rect id="corner-deco-2" class="secondary" x="350" y="250" width="30" height="30" rx="4" fill="#666666"/>
  <rect id="corner-deco-3" class="primary" x="360" y="260" width="30" height="30" rx="4" fill="#ffffff"/>
</svg>

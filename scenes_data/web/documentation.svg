<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 页面背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#f8f9fa"/>

  <!-- 顶部导航栏 -->
  <rect id="navbar" class="primary" x="0" y="0" width="600" height="45" fill="#1e1e1e"/>
  <rect id="logo" class="accent" x="20" y="12" width="25" height="20" rx="4" fill="#61dafb"/>
  <text id="logo-text" class="text" x="52" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" data-fixed-color="black">Docs</text>

  <!-- 搜索框 -->
  <rect id="search-box" class="secondary" x="200" y="10" width="200" height="25" rx="4" fill="#2d2d2d"/>
  <text id="search-placeholder" class="text" x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666" data-fixed-color="black">搜索文档...</text>

  <!-- 版本选择 -->
  <rect id="version-badge" class="accent" x="520" y="12" width="60" height="20" rx="4" fill="#61dafb"/>
  <text id="version-text" class="text" x="550" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e1e1e" data-fixed-color="black">v2.0.0</text>

  <!-- 左侧边栏导航 -->
  <rect id="sidebar" class="secondary" x="0" y="45" width="160" height="255" fill="#ffffff"/>

  <!-- 导航分组1 -->
  <text id="nav-group-1" class="text" x="15" y="70" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e1e1e" data-fixed-color="black">快速开始</text>
  <rect id="nav-item-active" class="accent" x="10" y="78" width="140" height="25" rx="4" fill="#e3f2fd"/>
  <text id="nav-item-1" class="text" x="20" y="94" font-family="Arial, sans-serif" font-size="9" fill="#1976d2" data-fixed-color="black">安装指南</text>

  <text id="nav-item-2" class="text" x="20" y="120" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">基础配置</text>
  <text id="nav-item-3" class="text" x="20" y="145" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">第一个应用</text>

  <!-- 导航分组2 -->
  <text id="nav-group-2" class="text" x="15" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e1e1e" data-fixed-color="black">核心概念</text>
  <text id="nav-item-4" class="text" x="20" y="195" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">组件系统</text>
  <text id="nav-item-5" class="text" x="20" y="220" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">状态管理</text>
  <text id="nav-item-6" class="text" x="20" y="245" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">路由配置</text>

  <!-- 导航分组3 -->
  <text id="nav-group-3" class="text" x="15" y="275" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e1e1e" data-fixed-color="black">API参考</text>

  <!-- 主内容区 -->
  <rect id="content-bg" class="secondary" x="160" y="45" width="440" height="255" fill="#ffffff"/>

  <!-- 面包屑 -->
  <text id="breadcrumb" class="text" x="180" y="65" font-family="Arial, sans-serif" font-size="9" fill="#888888" data-fixed-color="black">文档 > 快速开始 > 安装指南</text>

  <!-- 页面标题 -->
  <text id="page-title" class="text" x="180" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e1e1e" data-fixed-color="black">安装指南</text>

  <!-- 介绍文本 -->
  <rect id="intro-block" class="secondary" x="180" y="110" width="400" height="40" rx="4" fill="#f5f5f5"/>
  <text id="intro-text" class="text" x="190" y="125" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">本文档将指导您完成安装和基本配置。</text>
  <text id="intro-text-2" class="text" x="190" y="140" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">整个过程大约需要5分钟。</text>

  <!-- 代码块 -->
  <rect id="code-block" class="primary" x="180" y="165" width="400" height="80" rx="6" fill="#2d2d2d"/>

  <!-- 代码行 -->
  <text id="code-line-1" class="text" x="190" y="185" font-family="Consolas, monospace" font-size="9" fill="#61dafb" data-fixed-color="black">$ npm install my-app</text>
  <text id="code-line-2" class="text" x="190" y="205" font-family="Consolas, monospace" font-size="9" fill="#98c379" data-fixed-color="black">+ my-app@2.0.0</text>
  <text id="code-line-3" class="text" x="190" y="220" font-family="Consolas, monospace" font-size="9" fill="#e6c07b" data-fixed-color="black">added 42 packages in 3s</text>
  <text id="code-line-4" class="text" x="190" y="235" font-family="Consolas, monospace" font-size="9" fill="#ffffff" data-fixed-color="black">$ npm run dev</text>

  <!-- 复制按钮 -->
  <rect id="copy-btn" class="accent" x="540" y="170" width="30" height="18" rx="3" fill="#61dafb"/>
  <text id="copy-text" class="text" x="555" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e1e1e" data-fixed-color="black">复制</text>

  <!-- 提示框 -->
  <rect id="tip-box" class="accent" x="180" y="255" width="400" height="35" rx="4" fill="#fff3cd"/>
  <text id="tip-icon" class="text" x="190" y="275" font-family="Arial, sans-serif" font-size="12" fill="#856404" data-fixed-color="black">💡</text>
  <text id="tip-text" class="text" x="210" y="275" font-family="Arial, sans-serif" font-size="9" fill="#856404" data-fixed-color="black">提示: 确保您的Node.js版本 >= 16.0</text>
</svg>

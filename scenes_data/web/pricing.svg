<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 页面背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#f8f9fa"/>

  <!-- 导航栏 -->
  <rect id="navbar" class="primary" x="0" y="0" width="600" height="40" fill="#2d3436"/>
  <rect id="logo" class="accent" x="25" y="10" width="25" height="20" rx="4" fill="#6c5ce7"/>

  <!-- 页面标题 -->
  <text id="page-title" class="text" x="300" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" data-fixed-color="black">选择适合您的方案</text>
  <text id="page-subtitle" class="text" x="300" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#636e72" data-fixed-color="black">随时升级或降级，无隐藏费用</text>

  <!-- 价格卡片1 - 基础版 -->
  <rect id="pricing-1" class="secondary" x="50" y="110" width="150" height="160" rx="12" fill="#ffffff"/>
  <text id="plan-1-name" class="text" x="125" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436" data-fixed-color="black">基础版</text>
  <text id="plan-1-price" class="text" x="125" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" data-fixed-color="black">¥0</text>
  <text id="plan-1-period" class="text" x="125" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72" data-fixed-color="black">/月</text>

  <!-- 功能列表 -->
  <circle id="plan-1-check-1" class="accent" cx="75" cy="200" r="4" fill="#00b894"/>
  <text id="plan-1-feature-1" class="text" x="125" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">1个项目</text>

  <circle id="plan-1-check-2" class="accent" cx="75" cy="215" r="4" fill="#00b894"/>
  <text id="plan-1-feature-2" class="text" x="125" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">基础分析</text>

  <circle id="plan-1-check-3" class="accent" cx="75" cy="230" r="4" fill="#00b894"/>
  <text id="plan-1-feature-3" class="text" x="125" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">社区支持</text>

  <rect id="plan-1-btn" class="secondary" x="75" y="245" width="100" height="18" rx="4" fill="#dfe6e9"/>
  <text id="plan-1-btn-text" class="text" x="125" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436" data-fixed-color="black">开始使用</text>

  <!-- 价格卡片2 - 专业版 (推荐) -->
  <rect id="pricing-2" class="accent" x="225" y="110" width="150" height="180" rx="12" fill="#6c5ce7"/>
  <rect id="badge-popular" class="primary" x="275" y="105" width="50" height="16" rx="8" fill="#fdcb6e"/>
  <text id="badge-text" class="text" x="300" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2d3436" data-fixed-color="black">推荐</text>

  <text id="plan-2-name" class="text" x="300" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" data-fixed-color="black">专业版</text>
  <text id="plan-2-price" class="text" x="300" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" data-fixed-color="black">¥99</text>
  <text id="plan-2-period" class="text" x="300" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dfe6e9" data-fixed-color="black">/月</text>

  <circle id="plan-2-check-1" class="primary" cx="250" cy="215" r="4" fill="#ffffff"/>
  <text id="plan-2-feature-1" class="text" x="300" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dfe6e9" data-fixed-color="black">无限项目</text>

  <circle id="plan-2-check-2" class="primary" cx="250" cy="232" r="4" fill="#ffffff"/>
  <text id="plan-2-feature-2" class="text" x="300" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dfe6e9" data-fixed-color="black">高级分析</text>

  <circle id="plan-2-check-3" class="primary" cx="250" cy="249" r="4" fill="#ffffff"/>
  <text id="plan-2-feature-3" class="text" x="300" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dfe6e9" data-fixed-color="black">优先支持</text>

  <circle id="plan-2-check-4" class="primary" cx="250" cy="266" r="4" fill="#ffffff"/>
  <text id="plan-2-feature-4" class="text" x="300" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dfe6e9" data-fixed-color="black">API访问</text>

  <rect id="plan-2-btn" class="primary" x="240" y="275" width="120" height="14" rx="4" fill="#ffffff"/>
  <text id="plan-2-btn-text" class="text" x="300" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6c5ce7" data-fixed-color="black">立即升级</text>

  <!-- 价格卡片3 - 企业版 -->
  <rect id="pricing-3" class="secondary" x="400" y="110" width="150" height="160" rx="12" fill="#ffffff"/>
  <text id="plan-3-name" class="text" x="475" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436" data-fixed-color="black">企业版</text>
  <text id="plan-3-price" class="text" x="475" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" data-fixed-color="black">¥299</text>
  <text id="plan-3-period" class="text" x="475" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72" data-fixed-color="black">/月</text>

  <circle id="plan-3-check-1" class="accent" cx="425" cy="200" r="4" fill="#00b894"/>
  <text id="plan-3-feature-1" class="text" x="475" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">所有专业版功能</text>

  <circle id="plan-3-check-2" class="accent" cx="425" cy="215" r="4" fill="#00b894"/>
  <text id="plan-3-feature-2" class="text" x="475" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">专属客户经理</text>

  <circle id="plan-3-check-3" class="accent" cx="425" cy="230" r="4" fill="#00b894"/>
  <text id="plan-3-feature-3" class="text" x="475" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">定制开发</text>

  <circle id="plan-3-check-4" class="accent" cx="425" cy="245" r="4" fill="#00b894"/>
  <text id="plan-3-feature-4" class="text" x="475" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">SLA保障</text>

  <rect id="plan-3-btn" class="accent" x="415" y="252" width="120" height="18" rx="4" fill="#6c5ce7"/>
  <text id="plan-3-btn-text" class="text" x="475" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" data-fixed-color="black">联系销售</text>
</svg>

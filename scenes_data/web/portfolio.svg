<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 页面背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#ffffff"/>

  <!-- 极简头部 -->
  <text id="logo" class="text" x="40" y="40" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" data-fixed-color="black">作品集</text>

  <!-- 导航 -->
  <text id="nav-work" class="text" x="480" y="40" font-family="Arial, sans-serif" font-size="11" fill="#2d3436" data-fixed-color="black">作品</text>
  <text id="nav-about" class="text" x="520" y="40" font-family="Arial, sans-serif" font-size="11" fill="#636e72" data-fixed-color="black">关于</text>
  <text id="nav-contact" class="text" x="560" y="40" font-family="Arial, sans-serif" font-size="11" fill="#636e72" data-fixed-color="black">联系</text>

  <!-- 大标题介绍 -->
  <text id="headline" class="text" x="300" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2d3436" data-fixed-color="black">创意设计师</text>
  <text id="subheadline" class="text" x="300" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72" data-fixed-color="black">专注于品牌设计、UI/UX 和视觉艺术</text>

  <!-- 作品网格 2x2 -->
  <!-- 作品1 -->
  <rect id="work-1" class="secondary" x="90" y="135" width="200" height="100" rx="4" fill="#f8f9fa"/>
  <rect id="work-1-img" class="primary" x="100" y="145" width="180" height="70" rx="2" fill="#74b9ff"/>
  <text id="work-1-title" class="text" x="117" y="230" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3436" data-fixed-color="black">品牌视觉</text>
  <text id="work-1-cat" class="text" x="117" y="242" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">品牌设计</text>

  <!-- 作品2 -->
  <rect id="work-2" class="secondary" x="310" y="135" width="200" height="100" rx="4" fill="#f8f9fa"/>
  <rect id="work-2-img" class="accent" x="320" y="145" width="180" height="70" rx="2" fill="#fd79a8"/>
  <text id="work-2-title" class="text" x="337" y="230" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3436" data-fixed-color="black">移动应用</text>
  <text id="work-2-cat" class="text" x="337" y="242" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">UI/UX</text>

  <!-- 作品3 -->
  <rect id="work-3" class="secondary" x="90" y="245" width="200" height="40" rx="4" fill="#f8f9fa"/>
  <rect id="work-3-img" class="accent" x="100" y="252" width="50" height="26" rx="2" fill="#fdcb6e"/>
  <text id="work-3-title" class="text" x="160" y="265" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3436" data-fixed-color="black">海报设计</text>
  <text id="work-3-cat" class="text" x="160" y="277" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">平面设计</text>

  <!-- 作品4 -->
  <rect id="work-4" class="secondary" x="310" y="245" width="200" height="40" rx="4" fill="#f8f9fa"/>
  <rect id="work-4-img" class="primary" x="320" y="252" width="50" height="26" rx="2" fill="#a29bfe"/>
  <text id="work-4-title" class="text" x="380" y="265" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3436" data-fixed-color="black">插画创作</text>
  <text id="work-4-cat" class="text" x="380" y="277" font-family="Arial, sans-serif" font-size="8" fill="#636e72" data-fixed-color="black">插画</text>
</svg>

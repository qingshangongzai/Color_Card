<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 页面背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#fafafa"/>

  <!-- 导航栏 -->
  <rect id="navbar" class="primary" x="0" y="0" width="600" height="40" fill="#1a1a2e"/>
  <rect id="logo" class="accent" x="25" y="10" width="25" height="20" rx="4" fill="#e94560"/>

  <!-- Hero区域 -->
  <rect id="hero-bg" class="secondary" x="0" y="40" width="600" height="80" fill="#16213e"/>
  <text id="hero-title" class="text" x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" data-fixed-color="black">关于我们</text>
  <text id="hero-subtitle" class="text" x="300" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" data-fixed-color="black">创新驱动，技术引领</text>

  <!-- 时间线区域 -->
  <text id="timeline-title" class="text" x="300" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">发展历程</text>

  <!-- 时间线 -->
  <line id="timeline-line" class="stroke" x1="100" y1="175" x2="500" y2="175" stroke="#e94560" stroke-width="3"/>

  <!-- 时间节点1 -->
  <circle id="node-1" class="accent" cx="150" cy="175" r="8" fill="#e94560"/>
  <text id="year-1" class="text" x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">2020</text>
  <text id="event-1" class="text" x="150" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">公司成立</text>

  <!-- 时间节点2 -->
  <circle id="node-2" class="accent" cx="250" cy="175" r="8" fill="#e94560"/>
  <text id="year-2" class="text" x="250" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">2022</text>
  <text id="event-2" class="text" x="250" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">产品发布</text>

  <!-- 时间节点3 -->
  <circle id="node-3" class="accent" cx="350" cy="175" r="8" fill="#e94560"/>
  <text id="year-3" class="text" x="350" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">2024</text>
  <text id="event-3" class="text" x="350" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">用户破百万</text>

  <!-- 时间节点4 -->
  <circle id="node-4" class="accent" cx="450" cy="175" r="8" fill="#e94560"/>
  <text id="year-4" class="text" x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">2026</text>
  <text id="event-4" class="text" x="450" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">全球拓展</text>

  <!-- 团队成员区域 -->
  <text id="team-title" class="text" x="300" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">核心团队</text>

  <!-- 团队成员1 -->
  <circle id="member-1-avatar" class="accent" cx="150" cy="245" r="18" fill="#e94560"/>
  <text id="member-1-name" class="text" x="150" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">张明</text>
  <text id="member-1-role" class="text" x="150" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">CEO</text>

  <!-- 团队成员2 -->
  <circle id="member-2-avatar" class="primary" cx="250" cy="245" r="18" fill="#0f3460"/>
  <text id="member-2-name" class="text" x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">李华</text>
  <text id="member-2-role" class="text" x="250" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">CTO</text>

  <!-- 团队成员3 -->
  <circle id="member-3-avatar" class="accent" cx="350" cy="245" r="18" fill="#e94560"/>
  <text id="member-3-name" class="text" x="350" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">王芳</text>
  <text id="member-3-role" class="text" x="350" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">设计总监</text>

  <!-- 团队成员4 -->
  <circle id="member-4-avatar" class="primary" cx="450" cy="245" r="18" fill="#0f3460"/>
  <text id="member-4-name" class="text" x="450" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e" data-fixed-color="black">陈伟</text>
  <text id="member-4-role" class="text" x="450" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666" data-fixed-color="black">产品总监</text>
</svg>

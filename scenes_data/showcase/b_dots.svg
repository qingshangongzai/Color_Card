<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#ffffff"/>
  
  <!-- 第一行波点 -->
  <circle id="dot-r1-1" class="primary" cx="40" cy="30" r="15" fill="#1a1a1a"/>
  <circle id="dot-r1-2" class="secondary" cx="100" cy="30" r="10" fill="#333333"/>
  <circle id="dot-r1-3" class="accent" cx="160" cy="30" r="20" fill="#ff6b6b"/>
  <circle id="dot-r1-4" class="primary" cx="220" cy="30" r="12" fill="#1a1a1a"/>
  <circle id="dot-r1-5" class="secondary" cx="280" cy="30" r="18" fill="#333333"/>
  <circle id="dot-r1-6" class="accent" cx="340" cy="30" r="8" fill="#ff6b6b"/>
  
  <!-- 第二行波点 -->
  <circle id="dot-r2-1" class="accent" cx="70" cy="70" r="12" fill="#ff6b6b"/>
  <circle id="dot-r2-2" class="primary" cx="130" cy="70" r="18" fill="#1a1a1a"/>
  <circle id="dot-r2-3" class="secondary" cx="190" cy="70" r="8" fill="#333333"/>
  <circle id="dot-r2-4" class="accent" cx="250" cy="70" r="16" fill="#ff6b6b"/>
  <circle id="dot-r2-5" class="primary" cx="310" cy="70" r="10" fill="#1a1a1a"/>
  <circle id="dot-r2-6" class="secondary" cx="370" cy="70" r="14" fill="#333333"/>
  
  <!-- 第三行波点 -->
  <circle id="dot-r3-1" class="secondary" cx="40" cy="110" r="10" fill="#333333"/>
  <circle id="dot-r3-2" class="accent" cx="100" cy="110" r="16" fill="#ff6b6b"/>
  <circle id="dot-r3-3" class="primary" cx="160" cy="110" r="8" fill="#1a1a1a"/>
  <circle id="dot-r3-4" class="secondary" cx="220" cy="110" r="20" fill="#333333"/>
  <circle id="dot-r3-5" class="accent" cx="280" cy="110" r="12" fill="#ff6b6b"/>
  <circle id="dot-r3-6" class="primary" cx="340" cy="110" r="14" fill="#1a1a1a"/>
  
  <!-- 中间大波点区域 -->
  <circle id="big-dot-1" class="primary" cx="100" cy="180" r="40" fill="#1a1a1a"/>
  <circle id="big-dot-2" class="accent" cx="200" cy="180" r="35" fill="#ff6b6b"/>
  <circle id="big-dot-3" class="secondary" cx="300" cy="180" r="38" fill="#333333"/>
  
  <!-- 底部小波点 -->
  <circle id="dot-r4-1" class="accent" cx="50" cy="250" r="8" fill="#ff6b6b"/>
  <circle id="dot-r4-2" class="primary" cx="90" cy="250" r="6" fill="#1a1a1a"/>
  <circle id="dot-r4-3" class="secondary" cx="130" cy="250" r="10" fill="#333333"/>
  <circle id="dot-r4-4" class="accent" cx="170" cy="250" r="7" fill="#ff6b6b"/>
  <circle id="dot-r4-5" class="primary" cx="210" cy="250" r="9" fill="#1a1a1a"/>
  <circle id="dot-r4-6" class="secondary" cx="250" cy="250" r="6" fill="#333333"/>
  <circle id="dot-r4-7" class="accent" cx="290" cy="250" r="11" fill="#ff6b6b"/>
  <circle id="dot-r4-8" class="primary" cx="330" cy="250" r="8" fill="#1a1a1a"/>
  <circle id="dot-r4-9" class="secondary" cx="370" cy="250" r="7" fill="#333333"/>
  
  <!-- 底部装饰线 -->
  <line id="line-1" class="accent" x1="0" y1="280" x2="400" y2="280" stroke="#ff6b6b" stroke-width="4" stroke-dasharray="20,10"/>
  <line id="line-2" class="primary" x1="0" y1="290" x2="400" y2="290" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="10,15"/>
</svg>

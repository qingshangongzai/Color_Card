<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect id="background" class="background" width="400" height="300" fill="#f5f0fa"/>

  <!-- 背景装饰圆 -->
  <circle id="bg-circle" class="secondary" cx="200" cy="150" r="120" fill="#d8c4e0" opacity="0.3"/>
  <circle id="bg-circle-2" class="secondary" cx="200" cy="150" r="90" fill="#e8d8f0" opacity="0.4"/>

  <!-- 黑胶唱片 -->
  <g id="vinyl-record" transform="translate(200, 150)">
    <!-- 唱片外圈 -->
    <circle id="vinyl-outer" class="primary" cx="0" cy="0" r="80" fill="#2d2d2d"/>
    <!-- 唱片纹理 -->
    <circle id="vinyl-ring-1" class="stroke" cx="0" cy="0" r="70" stroke="#3d3d3d" stroke-width="1" fill="none"/>
    <circle id="vinyl-ring-2" class="stroke" cx="0" cy="0" r="60" stroke="#3d3d3d" stroke-width="1" fill="none"/>
    <circle id="vinyl-ring-3" class="stroke" cx="0" cy="0" r="50" stroke="#3d3d3d" stroke-width="1" fill="none"/>
    <circle id="vinyl-ring-4" class="stroke" cx="0" cy="0" r="40" stroke="#3d3d3d" stroke-width="1" fill="none"/>
    <!-- 唱片标签 -->
    <circle id="vinyl-label" class="accent" cx="0" cy="0" r="25" fill="#e74c3c" opacity="0.9"/>
    <circle id="vinyl-hole" class="text" cx="0" cy="0" r="4" fill="#f5f0fa"/>
    <!-- 标签装饰 -->
    <circle id="label-ring" class="text" cx="0" cy="0" r="18" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- 音符装饰 - 左侧 -->
  <g id="note-1" class="accent" transform="translate(80, 100)">
    <!-- 八分音符 -->
    <ellipse cx="0" cy="15" rx="8" ry="6" fill="#9b59b6"/>
    <rect x="6" y="-20" width="3" height="35" fill="#9b59b6"/>
    <path d="M9 -20 Q20 -15 25 -5" stroke="#9b59b6" stroke-width="3" fill="none"/>
  </g>

  <g id="note-2" class="primary" transform="translate(60, 180) rotate(-15)">
    <!-- 四分音符 -->
    <ellipse cx="0" cy="15" rx="8" ry="6" fill="#5d4e6d"/>
    <rect x="6" y="-25" width="3" height="40" fill="#5d4e6d"/>
  </g>

  <g id="note-3" class="secondary" transform="translate(100, 220)">
    <!-- 十六分音符 -->
    <ellipse cx="0" cy="12" rx="6" ry="5" fill="#8e7cc3"/>
    <rect x="4" y="-15" width="2" height="27" fill="#8e7cc3"/>
    <path d="M6 -15 Q15 -10 18 -2" stroke="#8e7cc3" stroke-width="2" fill="none"/>
    <path d="M6 -8 Q15 -3 18 5" stroke="#8e7cc3" stroke-width="2" fill="none"/>
  </g>

  <!-- 音符装饰 - 右侧 -->
  <g id="note-4" class="accent" transform="translate(320, 90) rotate(10)">
    <!-- 八分音符 -->
    <ellipse cx="0" cy="15" rx="8" ry="6" fill="#e74c3c"/>
    <rect x="6" y="-20" width="3" height="35" fill="#e74c3c"/>
    <path d="M9 -20 Q20 -15 25 -5" stroke="#e74c3c" stroke-width="3" fill="none"/>
  </g>

  <g id="note-5" class="primary" transform="translate(340, 160) rotate(20)">
    <!-- 二分音符 -->
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#5d4e6d"/>
    <ellipse cx="0" cy="20" rx="8" ry="6" fill="#5d4e6d"/>
    <rect x="6" y="-10" width="3" height="40" fill="#5d4e6d"/>
  </g>

  <g id="note-6" class="secondary" transform="translate(300, 230) rotate(-10)">
    <!-- 四分音符 -->
    <ellipse cx="0" cy="15" rx="8" ry="6" fill="#8e7cc3"/>
    <rect x="6" y="-25" width="3" height="40" fill="#8e7cc3"/>
  </g>

  <!-- 声波图案 -->
  <g id="sound-waves" class="secondary" opacity="0.6">
    <!-- 左侧声波 -->
    <path d="M30 150 Q40 140 50 150 Q60 160 70 150" stroke="#9b59b6" stroke-width="2" fill="none"/>
    <path d="M30 150 Q40 130 50 150 Q60 170 70 150" stroke="#9b59b6" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M30 150 Q40 120 50 150 Q60 180 70 150" stroke="#9b59b6" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- 右侧声波 -->
    <path d="M330 150 Q340 140 350 150 Q360 160 370 150" stroke="#9b59b6" stroke-width="2" fill="none"/>
    <path d="M330 150 Q340 130 350 150 Q360 170 370 150" stroke="#9b59b6" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M330 150 Q340 120 350 150 Q360 180 370 150" stroke="#9b59b6" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- 耳机 -->
  <g id="headphones" transform="translate(200, 80)">
    <!-- 头带 -->
    <path id="headband" class="primary" d="M-60 30 Q-60 -40 0 -40 Q60 -40 60 30" stroke="#4a4a4a" stroke-width="8" fill="none"/>
    <!-- 左耳罩 -->
    <rect id="ear-left" class="secondary" x="-70" y="20" width="20" height="35" rx="5" fill="#6b5b7d"/>
    <rect id="ear-left-inner" class="accent" x="-68" y="25" width="12" height="25" rx="3" fill="#9b59b6" opacity="0.5"/>
    <!-- 右耳罩 -->
    <rect id="ear-right" class="secondary" x="50" y="20" width="20" height="35" rx="5" fill="#6b5b7d"/>
    <rect id="ear-right-inner" class="accent" x="56" y="25" width="12" height="25" rx="3" fill="#9b59b6" opacity="0.5"/>
  </g>

  <!-- 均衡器条 -->
  <g id="equalizer" transform="translate(200, 260)" class="accent">
    <rect x="-60" y="-20" width="8" height="20" fill="#9b59b6" opacity="0.8"/>
    <rect x="-45" y="-35" width="8" height="35" fill="#e74c3c" opacity="0.8"/>
    <rect x="-30" y="-15" width="8" height="15" fill="#9b59b6" opacity="0.8"/>
    <rect x="-15" y="-40" width="8" height="40" fill="#e74c3c" opacity="0.8"/>
    <rect x="0" y="-25" width="8" height="25" fill="#9b59b6" opacity="0.8"/>
    <rect x="15" y="-30" width="8" height="30" fill="#e74c3c" opacity="0.8"/>
    <rect x="30" y="-18" width="8" height="18" fill="#9b59b6" opacity="0.8"/>
    <rect x="45" y="-35" width="8" height="35" fill="#e74c3c" opacity="0.8"/>
  </g>

  <!-- 装饰性星星 -->
  <g id="stars" class="accent" opacity="0.6">
    <path d="M50 60 L52 66 L58 66 L53 70 L55 76 L50 72 L45 76 L47 70 L42 66 L48 66 Z" fill="#f4d03f"/>
    <path d="M350 50 L351 53 L354 53 L352 55 L353 58 L350 56 L347 58 L348 55 L346 53 L349 53 Z" fill="#f4d03f"/>
    <path d="M370 200 L372 206 L378 206 L373 210 L375 216 L370 212 L365 216 L367 210 L362 206 L368 206 Z" fill="#f4d03f"/>
  </g>

  <!-- 点状装饰 -->
  <g id="dots" class="text" opacity="0.4">
    <circle cx="40" cy="250" r="3" fill="#6b5b7d"/>
    <circle cx="55" cy="260" r="2" fill="#6b5b7d"/>
    <circle cx="350" cy="120" r="3" fill="#6b5b7d"/>
    <circle cx="365" cy="130" r="2" fill="#6b5b7d"/>
    <circle cx="120" cy="50" r="2" fill="#6b5b7d"/>
    <circle cx="280" cy="60" r="2" fill="#6b5b7d"/>
  </g>

  <!-- 线条装饰 -->
  <g id="lines" class="stroke" opacity="0.3">
    <line x1="30" y1="100" x2="50" y2="100" stroke="#9b59b6" stroke-width="1"/>
    <line x1="350" y1="250" x2="370" y2="250" stroke="#9b59b6" stroke-width="1"/>
    <line x1="360" y1="240" x2="380" y2="240" stroke="#9b59b6" stroke-width="1"/>
  </g>
</svg>
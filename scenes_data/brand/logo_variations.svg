<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#f8f9fa"/>
  
  <!-- 顶部标题 -->
  <text id="page-title" class="text" x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" data-fixed-color="black">Logo 变体</text>
  
  <!-- 主 Logo 展示 -->
  <rect id="main-logo-bg" class="secondary" x="50" y="50" width="140" height="100" rx="8" fill="#ffffff"/>
  <circle id="main-logo-icon" class="primary" cx="120" cy="90" r="25" fill="#1a1a1a"/>
  <text id="main-logo-text" class="accent" x="120" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff6b6b" data-fixed-color="black">B</text>
  <text id="main-logo-label" class="text" x="120" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">BRAND</text>
  
  <!-- 横向 Logo -->
  <rect id="h-logo-bg" class="secondary" x="210" y="50" width="140" height="45" rx="8" fill="#ffffff"/>
  <circle id="h-logo-icon" class="accent" cx="240" cy="72" r="15" fill="#ff6b6b"/>
  <text id="h-logo-text" class="text" x="240" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" data-fixed-color="black">B</text>
  <text id="h-logo-label" class="text" x="285" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">BRAND</text>
  
  <!-- 图标变体展示 -->
  <rect id="icon-bg-1" class="secondary" x="210" y="105" width="42" height="45" rx="6" fill="#ffffff"/>
  <rect id="icon-1" class="primary" x="222" y="115" width="18" height="18" rx="4" fill="#1a1a1a"/>
  <text id="icon-label-1" class="text" x="231" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666666" data-fixed-color="black">方形</text>
  
  <rect id="icon-bg-2" class="secondary" x="259" y="105" width="42" height="45" rx="6" fill="#ffffff"/>
  <circle id="icon-2" class="accent" cx="280" cy="124" r="10" fill="#ff6b6b"/>
  <text id="icon-label-2" class="text" x="280" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666666" data-fixed-color="black">圆形</text>
  
  <rect id="icon-bg-3" class="secondary" x="308" y="105" width="42" height="45" rx="6" fill="#ffffff"/>
  <polygon id="icon-3" class="secondary" points="329,115 339,133 319,133" fill="#666666"/>
  <text id="icon-label-3" class="text" x="329" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666666" data-fixed-color="black">三角形</text>
  
  <!-- 单色版本展示 -->
  <rect id="mono-title-bg" class="primary" x="50" y="165" width="300" height="25" rx="4" fill="#1a1a1a"/>
  <text id="mono-title" class="text" x="200" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" data-fixed-color="black">单色版本</text>
  
  <!-- 黑色版本 -->
  <rect id="black-ver-bg" class="secondary" x="50" y="200" width="140" height="80" rx="8" fill="#ffffff"/>
  <circle id="black-ver-icon" class="primary" cx="120" cy="230" r="20" fill="#1a1a1a"/>
  <text id="black-ver-text" class="text" x="120" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" data-fixed-color="black">B</text>
  <text id="black-ver-label" class="text" x="120" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333333" data-fixed-color="black">黑色版本</text>
  
  <!-- 白色版本（深色背景） -->
  <rect id="white-ver-bg" class="primary" x="210" y="200" width="140" height="80" rx="8" fill="#333333"/>
  <circle id="white-ver-icon" class="secondary" cx="280" cy="230" r="20" fill="#ffffff"/>
  <text id="white-ver-text" class="text" x="280" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">B</text>
  <text id="white-ver-label" class="text" x="280" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cccccc" data-fixed-color="black">白色版本</text>
</svg>

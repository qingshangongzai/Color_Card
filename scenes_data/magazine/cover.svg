<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#ffffff"/>

  <!-- 顶部杂志名称 -->
  <text id="magazine-title" class="text" x="300" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">COLOR MAGAZINE</text>

  <!-- 主视觉区域 - 左侧大图 -->
  <rect id="cover-image" class="primary" x="20" y="50" width="280" height="200" rx="4" fill="#1a1a1a"/>
  <rect id="cover-image-inner" class="secondary" x="40" y="70" width="240" height="160" rx="2" fill="#333333"/>

  <!-- 右侧标题区域 -->
  <text id="cover-headline-1" class="text" x="320" y="80" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">色彩</text>
  <text id="cover-headline-2" class="accent" x="320" y="120" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ff6b6b">的力量</text>

  <!-- 副标题 -->
  <rect id="subtitle-bar" class="accent" x="320" y="135" width="60" height="3" fill="#ff6b6b"/>
  <text id="cover-subtitle" class="secondary" x="320" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666666" data-fixed-color="black">探索设计中的色彩美学</text>

  <!-- 文章列表 -->
  <text id="article-1" class="primary" x="320" y="185" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" data-fixed-color="black">01 年度色彩趋势报告</text>
  <text id="article-2" class="primary" x="320" y="205" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a" data-fixed-color="black">02 大师访谈：色彩与情感</text>
  <text id="article-3" class="secondary" x="320" y="225" font-family="Arial, sans-serif" font-size="10" fill="#666666" data-fixed-color="black">03 画廊精选作品</text>

  <!-- 期号信息 -->
  <rect id="issue-badge" class="accent" x="520" y="50" width="60" height="60" rx="30" fill="#ff6b6b"/>
  <text id="issue-number" class="text" x="550" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#ffffff" data-fixed-color="black">NO.</text>
  <text id="issue-year" class="text" x="550" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#ffffff" data-fixed-color="black">2026</text>

  <!-- 底部装饰条 -->
  <rect id="bottom-bar" class="primary" x="0" y="270" width="600" height="30" fill="#1a1a1a"/>
  <text id="footer-info" class="text" x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" data-fixed-color="black">春季刊 | 第 12 期</text>
</svg>

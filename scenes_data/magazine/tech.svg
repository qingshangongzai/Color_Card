<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#0a0a0a"/>

  <!-- 网格装饰 -->
  <line id="grid-1" class="secondary" x1="150" y1="0" x2="150" y2="300" stroke="#333333" stroke-width="1" opacity="0.5"/>
  <line id="grid-2" class="secondary" x1="300" y1="0" x2="300" y2="300" stroke="#333333" stroke-width="1" opacity="0.5"/>
  <line id="grid-3" class="secondary" x1="450" y1="0" x2="450" y2="300" stroke="#333333" stroke-width="1" opacity="0.5"/>

  <!-- 顶部标题栏 -->
  <rect id="header-bar" class="primary" x="20" y="20" width="560" height="30" rx="2" fill="#1a1a1a"/>
  <text id="tech-title" class="text" x="40" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" data-fixed-color="black">科技杂志</text>
  <rect id="header-accent" class="accent" x="520" y="25" width="50" height="20" rx="2" fill="#00d4ff"/>
  <text id="issue-num" class="text" x="545" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0a0a0a" data-fixed-color="black">第42期</text>

  <!-- 主标题 -->
  <text id="main-headline" class="text" x="300" y="90" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" fill="#ffffff" data-fixed-color="black">未来</text>
  <text id="sub-headline" class="accent" x="300" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff">已来</text>

  <!-- 数据可视化元素 -->
  <rect id="chart-bg" class="secondary" x="40" y="140" width="150" height="80" rx="4" fill="#1a1a1a"/>
  <rect id="bar-1" class="accent" x="50" y="180" width="20" height="30" rx="1" fill="#00d4ff"/>
  <rect id="bar-2" class="accent" x="80" y="160" width="20" height="50" rx="1" fill="#00d4ff"/>
  <rect id="bar-3" class="accent" x="110" y="170" width="20" height="40" rx="1" fill="#00d4ff"/>
  <rect id="bar-4" class="primary" x="140" y="150" width="20" height="60" rx="1" fill="#444444"/>

  <!-- 中间信息卡片 -->
  <rect id="info-card" class="secondary" x="210" y="140" width="150" height="80" rx="4" fill="#1a1a1a"/>
  <circle id="info-icon" class="accent" cx="235" cy="165" r="12" fill="#00d4ff"/>
  <rect id="info-line-1" class="primary" x="255" y="158" width="90" height="6" rx="1" fill="#444444"/>
  <rect id="info-line-2" class="primary" x="255" y="170" width="70" height="6" rx="1" fill="#444444"/>
  <rect id="info-line-3" class="primary" x="255" y="182" width="80" height="6" rx="1" fill="#444444"/>
  <rect id="info-line-4" class="primary" x="225" y="200" width="120" height="6" rx="1" fill="#444444"/>

  <!-- 右侧新增数据卡片 -->
  <rect id="data-card" class="secondary" x="380" y="140" width="150" height="80" rx="4" fill="#1a1a1a"/>
  <text id="data-label" class="text" x="455" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888" data-fixed-color="black">增长率</text>
  <text id="data-value" class="accent" x="455" y="195" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" fill="#00d4ff" data-fixed-color="black">+127%</text>
  <rect id="data-bar" class="accent" x="400" y="210" width="110" height="4" rx="2" fill="#00d4ff"/>

  <!-- 底部装饰线 -->
  <line id="bottom-line" class="accent" x1="40" y1="250" x2="560" y2="250" stroke="#00d4ff" stroke-width="2"/>
  <text id="footer-text" class="text" x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666666" data-fixed-color="black">人工智能 / 机器人 / 量子计算 / 太空探索</text>


</svg>

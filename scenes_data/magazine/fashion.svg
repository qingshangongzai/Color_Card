<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="600" height="300" fill="#fafafa"/>

  <!-- 顶部装饰条 -->
  <rect id="top-bar" class="primary" x="0" y="0" width="600" height="25" fill="#1a1a1a"/>
  <text id="magazine-name" class="text" x="300" y="17" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#ffffff" data-fixed-color="black">时装周</text>

  <!-- 左侧模特剪影区域 -->
  <rect id="model-bg" class="secondary" x="20" y="35" width="120" height="200" rx="4" fill="#e0e0e0"/>
  <ellipse id="model-head" class="primary" cx="80" cy="70" rx="25" ry="30" fill="#333333"/>
  <rect id="model-body" class="primary" x="55" y="100" width="50" height="100" rx="10" fill="#1a1a1a"/>

  <!-- 主标题 -->
  <text id="main-title" class="text" x="160" y="70" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a" data-fixed-color="black">风格</text>
  <text id="sub-title" class="accent" x="160" y="100" font-family="Georgia, serif" font-size="20" fill="#ff6b6b" data-fixed-color="black">革命</text>

  <!-- 右侧栏目标题 -->
  <rect id="section-bar" class="accent" x="160" y="115" width="420" height="3" fill="#ff6b6b"/>
  <text id="section-title" class="text" x="160" y="135" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#666666" data-fixed-color="black">2026 流行趋势</text>

  <!-- 文章摘要 -->
  <rect id="article-line-1" class="primary" x="160" y="150" width="400" height="6" rx="1" fill="#cccccc"/>
  <rect id="article-line-2" class="primary" x="160" y="162" width="380" height="6" rx="1" fill="#cccccc"/>
  <rect id="article-line-3" class="primary" x="160" y="174" width="390" height="6" rx="1" fill="#cccccc"/>

  <!-- 小图区域 -->
  <rect id="small-img-1" class="secondary" x="160" y="190" width="60" height="45" rx="4" fill="#dddddd"/>
  <rect id="small-img-2" class="accent" x="230" y="190" width="60" height="45" rx="4" fill="#ff6b6b"/>
  <rect id="small-img-3" class="primary" x="300" y="190" width="60" height="45" rx="4" fill="#333333"/>

  <!-- 底部信息 -->
  <rect id="bottom-bar" class="primary" x="0" y="250" width="600" height="50" fill="#1a1a1a"/>
  <text id="issue-info" class="text" x="30" y="275" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" data-fixed-color="black">春季刊</text>
  <text id="price" class="text" x="550" y="275" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" data-fixed-color="black">¥88</text>

  <!-- 装饰元素 -->
  <circle id="deco-dot-1" class="accent" cx="570" cy="45" r="8" fill="#ff6b6b"/>
  <circle id="deco-dot-2" class="secondary" cx="585" cy="60" r="5" fill="#cccccc"/>
</svg>

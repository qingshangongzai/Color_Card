<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 透明 -->
  <rect id="background" class="background" width="300" height="400" fill="transparent" data-fixed-color="original"/>

  <!-- 手机外框 -->
  <rect id="phone-frame" class="primary" x="79" y="22" width="142" height="356" rx="20" fill="#666666" data-fixed-color="original"/>

  <!-- 手机屏幕 -->
  <rect id="screen" class="background" x="81" y="24" width="138" height="352" rx="16" fill="#ffffff"/>

  <!-- 顶部装饰背景 -->
  <rect id="header-bg" class="accent" x="85" y="30" width="130" height="50" rx="10" fill="#7c4dff"/>

  <!-- 状态栏 -->
  <text id="time-text" class="text" x="150" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" data-fixed-color="black">9:41</text>

  <!-- 返回按钮 -->
  <path id="back-btn" d="M 95 84 L 90 87 L 95 90" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-fixed-color="black"/>

  <!-- 更多选项按钮 -->
  <circle id="more-btn" cx="195" cy="87" r="2" fill="#ffffff" data-fixed-color="black"/>
  <circle id="more-btn-2" cx="195" cy="92" r="2" fill="#ffffff" data-fixed-color="black"/>
  <circle id="more-btn-3" cx="195" cy="97" r="2" fill="#ffffff" data-fixed-color="black"/>

  <!-- 专辑封面区域 -->
  <rect id="album-cover" class="primary" x="105" y="95" width="90" height="90" rx="8" fill="#4a4a4a"/>
  <circle id="album-icon" cx="150" cy="140" r="20" fill="#666666"/>
  <path id="music-note" d="M 145 135 L 145 148 L 155 148 L 155 138" fill="none" stroke="#999999" stroke-width="2" stroke-linecap="round" data-fixed-color="black"/>

  <!-- 歌曲信息 -->
  <text id="song-title" class="text" x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333" data-fixed-color="black">夜曲</text>
  <text id="artist-name" class="text" x="150" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888888" data-fixed-color="black">周杰伦</text>

  <!-- 进度条 -->
  <rect id="progress-bg" class="secondary" x="95" y="240" width="110" height="4" rx="2" fill="#e0e0e0"/>
  <rect id="progress-bar" class="accent" x="95" y="240" width="65" height="4" rx="2" fill="#7c4dff"/>
  <circle id="progress-knob" cx="160" cy="242" r="5" fill="#7c4dff"/>

  <!-- 时间显示 -->
  <text id="current-time" class="text" x="95" y="255" font-family="Arial, sans-serif" font-size="8" fill="#888888" data-fixed-color="black">2:34</text>
  <text id="total-time" class="text" x="205" y="255" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#888888" data-fixed-color="black">4:12</text>

  <!-- 播放控制按钮 -->
  <!-- 上一首 - 左箭头 -->
  <path id="prev-btn" d="M 125 285 L 110 295 L 125 305 Z" fill="#666666" data-fixed-color="black"/>
  <rect id="prev-bar" x="110" y="285" width="3" height="20" rx="1" fill="#666666" data-fixed-color="black"/>

  <!-- 播放/暂停按钮 -->
  <circle id="play-btn-bg" class="accent" cx="150" cy="295" r="22" fill="#7c4dff"/>
  <rect id="pause-l" x="144" y="288" width="4" height="14" rx="1" fill="#ffffff" data-fixed-color="black"/>
  <rect id="pause-r" x="152" y="288" width="4" height="14" rx="1" fill="#ffffff" data-fixed-color="black"/>

  <!-- 下一首 - 右箭头 -->
  <path id="next-btn" d="M 175 285 L 190 295 L 175 305 Z" fill="#666666" data-fixed-color="black"/>
  <rect id="next-bar" x="187" y="285" width="3" height="20" rx="1" fill="#666666" data-fixed-color="black"/>

  <!-- 播放列表预览 -->
  <text id="playlist-title" class="text" x="95" y="335" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333333" data-fixed-color="black">播放列表</text>

  <!-- 列表项1 -->
  <rect id="playlist-item-1" class="secondary" x="95" y="342" width="110" height="25" rx="6" fill="#f5f5f5"/>
  <text id="playlist-num-1" x="105" y="358" font-family="Arial, sans-serif" font-size="9" fill="#7c4dff" data-fixed-color="black">1</text>
  <text id="playlist-song-1" class="text" x="118" y="358" font-family="Arial, sans-serif" font-size="9" fill="#333333" data-fixed-color="black">晴天</text>

  <!-- 列表项2 -->
  <rect id="playlist-item-2" class="secondary" x="95" y="342" width="110" height="25" rx="6" fill="#f5f5f5"/>
  <text id="playlist-num-2" x="105" y="358" font-family="Arial, sans-serif" font-size="9" fill="#888888" data-fixed-color="black">2</text>
  <text id="playlist-song-2" class="text" x="118" y="358" font-family="Arial, sans-serif" font-size="9" fill="#666666" data-fixed-color="black">七里香</text>
</svg>

<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#f5f5f5"/>
  
  <!-- 大格子区域 - 左上 -->
  <g id="large-grid">
    <rect id="lg-cell-1" class="primary" x="20" y="20" width="60" height="60" fill="#1a1a1a"/>
    <rect id="lg-cell-2" class="background" x="80" y="20" width="60" height="60" fill="#ffffff"/>
    <rect id="lg-cell-3" class="accent" x="140" y="20" width="60" height="60" fill="#ff6b6b"/>
    <rect id="lg-cell-4" class="background" x="20" y="80" width="60" height="60" fill="#ffffff"/>
    <rect id="lg-cell-5" class="secondary" x="80" y="80" width="60" height="60" fill="#333333"/>
    <rect id="lg-cell-6" class="background" x="140" y="80" width="60" height="60" fill="#ffffff"/>
    <rect id="lg-cell-7" class="accent" x="20" y="140" width="60" height="60" fill="#ff6b6b"/>
    <rect id="lg-cell-8" class="background" x="80" y="140" width="60" height="60" fill="#ffffff"/>
    <rect id="lg-cell-9" class="primary" x="140" y="140" width="60" height="60" fill="#1a1a1a"/>
  </g>
  
  <!-- 细格子区域 - 右上 -->
  <g id="fine-grid" transform="translate(220, 20)">
    <!-- 水平线 -->
    <line class="secondary" x1="0" y1="0" x2="160" y2="0" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="20" x2="160" y2="20" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="40" x2="160" y2="40" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="60" x2="160" y2="60" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="80" x2="160" y2="80" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="100" x2="160" y2="100" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="120" x2="160" y2="120" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="140" x2="160" y2="140" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="160" x2="160" y2="160" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="0" y1="180" x2="160" y2="180" stroke="#333333" stroke-width="1"/>
    <!-- 垂直线 -->
    <line class="secondary" x1="0" y1="0" x2="0" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="20" y1="0" x2="20" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="40" y1="0" x2="40" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="60" y1="0" x2="60" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="80" y1="0" x2="80" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="100" y1="0" x2="100" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="120" y1="0" x2="120" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="140" y1="0" x2="140" y2="180" stroke="#333333" stroke-width="1"/>
    <line class="secondary" x1="160" y1="0" x2="160" y2="180" stroke="#333333" stroke-width="1"/>
    <!-- 填充色块 -->
    <rect class="accent" x="20" y="20" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="60" y="20" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="100" y="20" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="140" y="20" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="0" y="60" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="40" y="60" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="80" y="60" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
    <rect class="accent" x="120" y="60" width="20" height="20" fill="#ff6b6b" opacity="0.7"/>
  </g>
  
  <!-- 棋盘格 - 左下 -->
  <g id="checkerboard" transform="translate(20, 220)">
    <rect class="primary" x="0" y="0" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="25" y="0" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="50" y="0" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="75" y="0" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="100" y="0" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="125" y="0" width="25" height="25" fill="#ffffff"/>
    <rect class="background" x="0" y="25" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="25" y="25" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="50" y="25" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="75" y="25" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="100" y="25" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="125" y="25" width="25" height="25" fill="#1a1a1a"/>
    <rect class="primary" x="0" y="50" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="25" y="50" width="25" height="25" fill="#ffffff"/>
    <rect class="primary" x="50" y="50" width="25" height="25" fill="#1a1a1a"/>
    <rect class="background" x="75" y="50" width="25" height="25" fill="#ffffff"/>
    <rect class="accent" x="100" y="50" width="25" height="25" fill="#ff6b6b"/>
    <rect class="background" x="125" y="50" width="25" height="25" fill="#ffffff"/>
  </g>
  
  <!-- 交错格子 - 右下 -->
  <g id="staggered-grid" transform="translate(180, 220)">
    <rect class="secondary" x="0" y="0" width="40" height="20" fill="#333333"/>
    <rect class="secondary" x="50" y="0" width="40" height="20" fill="#333333"/>
    <rect class="secondary" x="100" y="0" width="40" height="20" fill="#333333"/>
    <rect class="secondary" x="150" y="0" width="40" height="20" fill="#333333"/>
    <rect class="secondary" x="200" y="0" width="40" height="20" fill="#333333"/>
    
    <rect class="accent" x="25" y="25" width="40" height="20" fill="#ff6b6b"/>
    <rect class="accent" x="75" y="25" width="40" height="20" fill="#ff6b6b"/>
    <rect class="accent" x="125" y="25" width="40" height="20" fill="#ff6b6b"/>
    <rect class="accent" x="175" y="25" width="40" height="20" fill="#ff6b6b"/>
    
    <rect class="primary" x="0" y="50" width="40" height="20" fill="#1a1a1a"/>
    <rect class="primary" x="50" y="50" width="40" height="20" fill="#1a1a1a"/>
    <rect class="primary" x="100" y="50" width="40" height="20" fill="#1a1a1a"/>
    <rect class="primary" x="150" y="50" width="40" height="20" fill="#1a1a1a"/>
    <rect class="primary" x="200" y="50" width="40" height="20" fill="#1a1a1a"/>
  </g>
</svg>
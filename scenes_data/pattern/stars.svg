<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect id="background" class="background" width="400" height="300" fill="#f5f5f5"/>
  
  <!-- 大星星 - 顶部区域 -->
  <g id="large-stars">
    <!-- 五角星1 -->
    <polygon id="star-1" class="primary" points="60,20 65,35 80,35 68,45 73,60 60,50 47,60 52,45 40,35 55,35" fill="#1a1a1a"/>
    <!-- 五角星2 -->
    <polygon id="star-2" class="accent" points="140,30 145,45 160,45 148,55 153,70 140,60 127,70 132,55 120,45 135,45" fill="#ff6b6b"/>
    <!-- 五角星3 -->
    <polygon id="star-3" class="secondary" points="220,25 225,40 240,40 228,50 233,65 220,55 207,65 212,50 200,40 215,40" fill="#333333"/>
    <!-- 五角星4 -->
    <polygon id="star-4" class="accent" points="300,20 305,35 320,35 308,45 313,60 300,50 287,60 292,45 280,35 295,35" fill="#ff6b6b"/>
    <!-- 五角星5 -->
    <polygon id="star-5" class="primary" points="360,35 365,50 380,50 368,60 373,75 360,65 347,75 352,60 340,50 355,50" fill="#1a1a1a"/>
  </g>
  
  <!-- 四角星区域 -->
  <g id="four-point-stars">
    <path class="secondary" d="M100 80 L105 90 L115 95 L105 100 L100 110 L95 100 L85 95 L95 90 Z" fill="#333333"/>
    <path class="accent" d="M180 75 L185 85 L195 90 L185 95 L180 105 L175 95 L165 90 L175 85 Z" fill="#ff6b6b"/>
    <path class="primary" d="M260 85 L265 95 L275 100 L265 105 L260 115 L255 105 L245 100 L255 95 Z" fill="#1a1a1a"/>
    <path class="secondary" d="M340 80 L345 90 L355 95 L345 100 L340 110 L335 100 L325 95 L335 90 Z" fill="#333333"/>
  </g>
  
  <!-- 中间流星区域 -->
  <g id="shooting-stars">
    <!-- 流星1 -->
    <line class="accent" x1="50" y1="140" x2="120" y2="180" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <polygon class="accent" points="120,180 115,175 115,185" fill="#ff6b6b"/>
    <!-- 流星2 -->
    <line class="primary" x1="200" y1="130" x2="280" y2="170" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <polygon class="primary" points="280,170 274,166 274,174" fill="#1a1a1a"/>
    <!-- 流星3 -->
    <line class="secondary" x1="320" y1="150" x2="380" y2="185" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
    <polygon class="secondary" points="380,185 375,181 375,189" fill="#333333"/>
  </g>
  
  <!-- 圆形星星混合区域 -->
  <g id="mixed-stars" transform="translate(0, 200)">
    <!-- 六角星 -->
    <g transform="translate(60, 40)">
      <polygon class="primary" points="0,-20 6,-6 20,0 6,6 0,20 -6,6 -20,0 -6,-6" fill="#1a1a1a"/>
      <circle class="accent" cx="0" cy="0" r="5" fill="#ff6b6b"/>
    </g>
    <!-- 八角星 -->
    <g transform="translate(140, 35)">
      <polygon class="accent" points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#ff6b6b"/>
      <circle class="secondary" cx="0" cy="0" r="4" fill="#333333"/>
    </g>
    <!-- 六角星2 -->
    <g transform="translate(220, 40)">
      <polygon class="secondary" points="0,-20 6,-6 20,0 6,6 0,20 -6,6 -20,0 -6,-6" fill="#333333"/>
      <circle class="primary" cx="0" cy="0" r="5" fill="#1a1a1a"/>
    </g>
    <!-- 八角星2 -->
    <g transform="translate(300, 35)">
      <polygon class="primary" points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#1a1a1a"/>
      <circle class="accent" cx="0" cy="0" r="4" fill="#ff6b6b"/>
    </g>
    <!-- 六角星3 -->
    <g transform="translate(360, 45)">
      <polygon class="accent" points="0,-15 5,-5 15,0 5,5 0,15 -5,5 -15,0 -5,-5" fill="#ff6b6b"/>
    </g>
  </g>
  
  <!-- 小星星点缀 -->
  <g id="small-stars">
    <circle class="secondary" cx="40" cy="100" r="3" fill="#333333"/>
    <circle class="accent" cx="120" cy="120" r="2" fill="#ff6b6b"/>
    <circle class="primary" cx="200" cy="105" r="3" fill="#1a1a1a"/>
    <circle class="secondary" cx="280" cy="115" r="2" fill="#333333"/>
    <circle class="accent" cx="370" cy="100" r="3" fill="#ff6b6b"/>
    
    <circle class="accent" cx="80" cy="170" r="2" fill="#ff6b6b"/>
    <circle class="primary" cx="160" cy="185" r="3" fill="#1a1a1a"/>
    <circle class="secondary" cx="240" cy="175" r="2" fill="#333333"/>
    <circle class="accent" cx="320" cy="190" r="3" fill="#ff6b6b"/>
  </g>
  
  <!-- 底部星轨 -->
  <g id="star-trails">
    <path class="secondary" d="M20 280 Q100 260 180 280 Q260 300 340 280 Q380 270 400 275" stroke="#333333" stroke-width="1" fill="none" stroke-dasharray="5,5"/>
    <circle class="primary" cx="50" cy="275" r="4" fill="#1a1a1a"/>
    <circle class="accent" cx="130" cy="270" r="3" fill="#ff6b6b"/>
    <circle class="primary" cx="210" cy="280" r="4" fill="#1a1a1a"/>
    <circle class="accent" cx="290" cy="275" r="3" fill="#ff6b6b"/>
    <circle class="primary" cx="370" cy="278" r="4" fill="#1a1a1a"/>
  </g>
  
  <!-- 十字星装饰 -->
  <g id="cross-stars" opacity="0.6">
    <line class="accent" x1="30" y1="60" x2="30" y2="70" stroke="#ff6b6b" stroke-width="2"/>
    <line class="accent" x1="25" y1="65" x2="35" y2="65" stroke="#ff6b6b" stroke-width="2"/>
    
    <line class="primary" x1="380" y1="130" x2="380" y2="140" stroke="#1a1a1a" stroke-width="2"/>
    <line class="primary" x1="375" y1="135" x2="385" y2="135" stroke="#1a1a1a" stroke-width="2"/>
    
    <line class="secondary" x1="100" y1="250" x2="100" y2="260" stroke="#333333" stroke-width="2"/>
    <line class="secondary" x1="95" y1="255" x2="105" y2="255" stroke="#333333" stroke-width="2"/>
    
    <line class="accent" x1="250" y1="240" x2="250" y2="250" stroke="#ff6b6b" stroke-width="2"/>
    <line class="accent" x1="245" y1="245" x2="255" y2="245" stroke="#ff6b6b" stroke-width="2"/>
  </g>
</svg>
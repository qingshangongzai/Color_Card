[pytest]
# pytest 配置文件
# 文档: https://docs.pytest.org/en/stable/reference.html#ini-options-ref

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 默认命令行选项
# -v: 详细输出
# --tb=short: 简短的错误追溯
# -ra: 显示所有测试结果的摘要
addopts = -v --tb=short -ra

# Qt 相关配置
[pytest-qt]
# 自动处理 Qt 事件循环
qt_api = pyside6

# 超时设置（秒）
# timeout = 30

# 日志配置
# log_cli = true
# log_cli_level = INFO
# log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
# log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记配置
markers =
    slow: 标记运行较慢的测试
    unit: 单元测试
    integration: 集成测试
    ui: UI 测试

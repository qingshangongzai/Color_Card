name: Build Windows App with Nuitka (Debug)

on:
  push:
    branches: [ fix/packaging-dependencies ]
  workflow_dispatch:

jobs:
  build-windows-debug:
    runs-on: windows-latest

    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka[onefile]
        pip install -r requirements.txt

    - name: Build Windows EXE with Nuitka (Debug Mode)
      shell: cmd
      env:
        NUITKA_CACHE_DIR: "%LOCALAPPDATA%\Nuitka"
      run: |
        python -m nuitka ^
          --standalone ^
          --onefile ^
          --assume-yes-for-downloads ^
          --windows-console-mode=force ^
          --windows-icon-from-ico="logo/Color Card_logo.ico" ^
          --include-data-files=version.py=version.py ^
          --include-data-dir=color_data=color_data ^
          --include-data-dir=core=core ^
          --include-data-dir=dialogs=dialogs ^
          --include-data-dir=file=file ^
          --include-data-dir=locales=locales ^
          --include-data-dir=logo=logo ^
          --include-data-dir=scenes_data=scenes_data ^
          --include-data-dir=ui=ui ^
          --include-data-dir=utils=utils ^
          --enable-plugin=pyside6 ^
          --jobs=4 ^
          --output-filename="Color Card Debug" ^
          main.py

    - name: Check build output
      shell: pwsh
      run: |
        Write-Host "Checking build directory..."
        Get-ChildItem -Path "*.exe" -ErrorAction SilentlyContinue

    - name: Upload debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-Windows-Debug
        path: "Color Card Debug.exe"

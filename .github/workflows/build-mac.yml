name: Build Mac App

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.19.0
        pip install -r requirements.txt
    
    - name: Read version
      id: version
      run: |
        VERSION=$(sed -n '1p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        FILE_VERSION=$(sed -n '2p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        PRODUCT_VERSION=$(sed -n '3p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COMPANY_NAME=$(sed -n '4p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COPYRIGHT=$(sed -n '5p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        APP_NAME=$(sed -n '6p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        echo "Debug: version content is: '$VERSION'"
        echo "Debug: file version is: '$FILE_VERSION'"
        echo "Debug: product version is: '$PRODUCT_VERSION'"
        echo "Debug: company name is: '$COMPANY_NAME'"
        echo "Debug: copyright is: '$COPYRIGHT'"
        echo "Debug: app name is: '$APP_NAME'"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "file_version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
        echo "product_version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
        echo "company_name=$COMPANY_NAME" >> "$GITHUB_OUTPUT"
        echo "copyright=$COPYRIGHT" >> "$GITHUB_OUTPUT"
        echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
    
    - name: Create Info.plist
      run: |
        cat > Info.plist << 'PLISTEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ColorCard</string>
            <key>CFBundleIdentifier</key>
            <string>com.hxiaostudio.colorcard</string>
            <key>CFBundleName</key>
            <string>ColorCard</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.4.1</string>
            <key>CFBundleVersion</key>
            <string>2026.3.2.1</string>
            <key>CFBundleGetInfoString</key>
            <string>取色卡 - Color Card</string>
            <key>NSHumanReadableCopyright</key>
            <string>Copyright 2026 HXiao Studio</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.14</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSUIElement</key>
            <false/>
            <key>NSRequiresAquaSystemAppearance</key>
            <false/>
        </dict>
        </plist>
        PLISTEOF
    
    - name: Build Mac App with PyInstaller
      run: |
        pyinstaller \
          --name "ColorCard" \
          --windowed \
          --onefile \
          --icon "logo/ColorCard.icns" \
          --add-data "version.py:." \
          --add-data "core:core" \
          --add-data "dialogs:dialogs" \
          --add-data "file:file" \
          --add-data "logo:logo" \
          --add-data "ui:ui" \
          --add-data "utils:utils" \
          --add-data "locales:locales" \
          --add-data "color_data:color_data" \
          --add-data "scenes_data:scenes_data" \
          --exclude-module "PySide6.Qt3DAnimation" \
          --exclude-module "PySide6.Qt3DCore" \
          --exclude-module "PySide6.Qt3DExtras" \
          --exclude-module "PySide6.Qt3DInput" \
          --exclude-module "PySide6.Qt3DLogic" \
          --exclude-module "PySide6.Qt3DRender" \
          --exclude-module "PySide6.QtCharts" \
          --exclude-module "PySide6.QtDataVisualization" \
          --exclude-module "PySide6.QtGraphs" \
          --exclude-module "PySide6.QtLocation" \
          --exclude-module "PySide6.QtMultimedia" \
          --exclude-module "PySide6.QtMultimediaWidgets" \
          --exclude-module "PySide6.QtNetworkAuth" \
          --exclude-module "PySide6.QtPositioning" \
          --exclude-module "PySide6.QtQuick" \
          --exclude-module "PySide6.QtQuick3D" \
          --exclude-module "PySide6.QtQuickWidgets" \
          --exclude-module "PySide6.QtRemoteObjects" \
          --exclude-module "PySide6.QtSensors" \
          --exclude-module "PySide6.QtSerialBus" \
          --exclude-module "PySide6.QtSerialPort" \
          --exclude-module "PySide6.QtSql" \
          --exclude-module "PySide6.QtStateMachine" \
          --exclude-module "PySide6.QtTest" \
          --exclude-module "PySide6.QtTextToSpeech" \
          --exclude-module "PySide6.QtWebChannel" \
          --exclude-module "PySide6.QtWebEngineCore" \
          --exclude-module "PySide6.QtWebEngineQuick" \
          --exclude-module "PySide6.QtWebEngineWidgets" \
          --exclude-module "PySide6.QtWebSockets" \
          --exclude-module "PySide6.QtXmlPatterns" \
          --exclude-module "PySide6.QtOpenGL" \
          --exclude-module "PySide6.QtOpenGLWidgets" \
          --exclude-module "PySide6.QtPdf" \
          --exclude-module "PySide6.QtPdfWidgets" \
          --exclude-module "PySide6.QtConcurrent" \
          --exclude-module "PySide6.QtHelp" \
          --exclude-module "unittest" \
          --exclude-module "pydoc" \
          --exclude-module "doctest" \
          --exclude-module "test" \
          --exclude-module "matplotlib" \
          --exclude-module "pandas" \
          --exclude-module "scipy" \
          --exclude-module "sklearn" \
          --exclude-module "cv2" \
          --exclude-module "tkinter" \
          --exclude-module "_tkinter" \
          --osx-bundle-identifier "com.hxiaostudio.colorcard" \
          --clean \
          main.py
    
    - name: Copy custom Info.plist
      run: |
        # 复制自定义的 Info.plist 到生成的 .app 包中
        cp Info.plist dist/ColorCard.app/Contents/Info.plist
    
    - name: Check build output
      run: |
        echo "Checking dist directory..."
        ls -la dist/
        echo "Checking ColorCard.app..."
        ls -la dist/ColorCard.app/Contents/MacOS/ || echo "ColorCard.app not found"
    
    - name: Sign App (Ad-hoc)
      run: |
        # 使用 ad-hoc 签名（不需要 Apple Developer 证书）
        # 这可以解决 "已损坏" 的问题，但用户仍需在系统偏好设置中允许
        codesign --force --deep --sign - --timestamp=none dist/ColorCard.app
        
        # 验证签名
        codesign -dv --verbose=4 dist/ColorCard.app
    
    - name: Create DMG
      run: |
        # 创建临时目录用于 DMG
        mkdir -p dist/dmg
        
        # 复制签名后的 .app 到临时目录
        cp -R dist/ColorCard.app dist/dmg/
        
        # 创建 Applications 文件夹快捷方式
        ln -s /Applications dist/dmg/Applications
        
        # 创建 DMG
        hdiutil create -volname "ColorCard" -srcfolder dist/dmg -ov -format UDZO dist/Color_Card_${{ steps.version.outputs.version }}_mac.dmg
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-macOS
        path: dist/Color_Card_*_mac.dmg
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/Color_Card_*_mac.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

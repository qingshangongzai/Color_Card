name: Build Mac App with Nuitka

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.cache/Nuitka
        key: ${{ runner.os }}-pip-nuitka-${{ hashFiles('requirements.txt') }}-${{ hashFiles('main.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-nuitka-${{ hashFiles('requirements.txt') }}-
          ${{ runner.os }}-pip-nuitka-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka[onefile]
        pip install -r requirements.txt

    - name: Read version
      id: version
      run: |
        VERSION=$(sed -n '1p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        FILE_VERSION=$(sed -n '2p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        PRODUCT_VERSION=$(sed -n '3p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COMPANY_NAME=$(sed -n '4p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COPYRIGHT=$(sed -n '5p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        APP_NAME=$(sed -n '6p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "file_version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
        echo "product_version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
        echo "company_name=$COMPANY_NAME" >> "$GITHUB_OUTPUT"
        echo "copyright=$COPYRIGHT" >> "$GITHUB_OUTPUT"
        echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

    - name: Build Mac App with Nuitka
      env:
        NUITKA_CACHE_DIR: "$HOME/.cache/Nuitka"
      run: |
        python -m nuitka \
          --mode=app \
          --macos-app-icon="logo/ColorCard.icns" \
          --macos-app-name="Color Card" \
          --macos-app-version="${{ steps.version.outputs.version }}" \
          --include-data-files=version.py=version.py \
          --include-data-dir=color_data=color_data \
          --include-data-dir=core=core \
          --include-data-dir=dialogs=dialogs \
          --include-data-dir=file=file \
          --include-data-dir=locales=locales \
          --include-data-dir=logo=logo \
          --include-data-dir=scenes_data=scenes_data \
          --include-data-dir=ui=ui \
          --include-data-dir=utils=utils \
          --enable-plugin=pyside6 \
          --jobs=4 \
          --output-dir=dist \
          main.py

    - name: Fix app bundle name and localization
      run: |
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)

        if [ "$APP_BUNDLE" != "dist/ColorCard.app" ]; then
          mv "$APP_BUNDLE" "dist/ColorCard.app"
          APP_BUNDLE="dist/ColorCard.app"
        fi

        INFO_PLIST="$APP_BUNDLE/Contents/Info.plist"
        plutil -replace CFBundleName -string "ColorCard" "$INFO_PLIST"
        plutil -replace CFBundleDisplayName -string "ColorCard" "$INFO_PLIST"
        plutil -replace CFBundleIdentifier -string "Color Card" "$INFO_PLIST"

        LOCALES_DIR="$APP_BUNDLE/Contents/Resources"
        mkdir -p "$LOCALES_DIR/zh-Hans.lproj"
        printf '%s\n' '"CFBundleName" = "取色卡";' '"CFBundleDisplayName" = "取色卡";' > "$LOCALES_DIR/zh-Hans.lproj/InfoPlist.strings.utf8"
        iconv -f UTF-8 -t UTF-16 "$LOCALES_DIR/zh-Hans.lproj/InfoPlist.strings.utf8" > "$LOCALES_DIR/zh-Hans.lproj/InfoPlist.strings"
        rm "$LOCALES_DIR/zh-Hans.lproj/InfoPlist.strings.utf8"
        mkdir -p "$LOCALES_DIR/zh-Hant.lproj"
        printf '%s\n' '"CFBundleName" = "取色卡";' '"CFBundleDisplayName" = "取色卡";' > "$LOCALES_DIR/zh-Hant.lproj/InfoPlist.strings.utf8"
        iconv -f UTF-8 -t UTF-16 "$LOCALES_DIR/zh-Hant.lproj/InfoPlist.strings.utf8" > "$LOCALES_DIR/zh-Hant.lproj/InfoPlist.strings"
        rm "$LOCALES_DIR/zh-Hant.lproj/InfoPlist.strings.utf8"
        mkdir -p "$LOCALES_DIR/en.lproj"
        printf '%s\n' '"CFBundleName" = "Color Card";' '"CFBundleDisplayName" = "Color Card";' > "$LOCALES_DIR/en.lproj/InfoPlist.strings.utf8"
        iconv -f UTF-8 -t UTF-16 "$LOCALES_DIR/en.lproj/InfoPlist.strings.utf8" > "$LOCALES_DIR/en.lproj/InfoPlist.strings"
        rm "$LOCALES_DIR/en.lproj/InfoPlist.strings.utf8"

    - name: Sign App (Ad-hoc)
      run: |
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
        codesign --force --deep --sign - --timestamp=none "$APP_BUNDLE"

    - name: Install create-dmg
      run: |
        brew install create-dmg

    - name: Create DMG with custom background
      run: |
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)

        mkdir -p dist/dmg
        cp -R "$APP_BUNDLE" dist/dmg/

        COPIED_APP=$(find dist/dmg -name "*.app" -type d | head -1)
        codesign --force --deep --sign - --timestamp=none "$COPIED_APP"

        if [ -f "logo/dmg_background.png" ]; then
          cp logo/dmg_background.png dist/dmg/.background.png
        fi

        if [ -f "logo/dmg_background.png" ]; then
          create-dmg \
            --volname "取色卡" \
            --volicon "logo/ColorCard.icns" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --icon "ColorCard.app" 200 250 \
            --icon "Applications" 600 250 \
            --background "logo/dmg_background.png" \
            --app-drop-link 600 250 \
            --no-internet-enable \
            "dist/Color_Card_${{ steps.version.outputs.version }}_mac.dmg" \
            "dist/dmg/ColorCard.app"
        else
          create-dmg \
            --volname "取色卡" \
            --volicon "logo/ColorCard.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ColorCard.app" 150 200 \
            --icon "Applications" 450 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "dist/Color_Card_${{ steps.version.outputs.version }}_mac.dmg" \
            "dist/dmg/ColorCard.app"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-macOS
        path: dist/Color_Card_*_mac.dmg

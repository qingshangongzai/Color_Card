name: Build Mac App with Nuitka

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka[onefile]
        pip install -r requirements.txt

    - name: Read version
      id: version
      run: |
        VERSION=$(sed -n '1p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        FILE_VERSION=$(sed -n '2p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        PRODUCT_VERSION=$(sed -n '3p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COMPANY_NAME=$(sed -n '4p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        COPYRIGHT=$(sed -n '5p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        APP_NAME=$(sed -n '6p' version.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        echo "Debug: version content is: '$VERSION'"
        echo "Debug: file version is: '$FILE_VERSION'"
        echo "Debug: product version is: '$PRODUCT_VERSION'"
        echo "Debug: company name is: '$COMPANY_NAME'"
        echo "Debug: copyright is: '$COPYRIGHT'"
        echo "Debug: app name is: '$APP_NAME'"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "file_version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
        echo "product_version=$PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
        echo "company_name=$COMPANY_NAME" >> "$GITHUB_OUTPUT"
        echo "copyright=$COPYRIGHT" >> "$GITHUB_OUTPUT"
        echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

    - name: Build Mac App with Nuitka
      run: |
        python -m nuitka \
          --mode=app \
          --macos-app-icon="logo/ColorCard.icns" \
          --macos-app-name="Color Card" \
          --macos-app-version="${{ steps.version.outputs.version }}" \
          --include-data-files=version.py=version.py \
          --include-data-dir=color_data=color_data \
          --include-data-dir=core=core \
          --include-data-dir=dialogs=dialogs \
          --include-data-dir=file=file \
          --include-data-dir=locales=locales \
          --include-data-dir=logo=logo \
          --include-data-dir=scenes_data=scenes_data \
          --include-data-dir=ui=ui \
          --include-data-dir=utils=utils \
          --enable-plugin=pyside6 \
          --lto=yes \
          --jobs=4 \
          --output-dir=dist \
          main.py

    - name: Check build output
      run: |
        echo "Checking dist directory..."
        ls -la dist/
        echo "Checking for .app bundle..."
        find dist -name "*.app" -type d
        echo "Checking app bundle contents..."
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
        if [ -n "$APP_BUNDLE" ]; then
          ls -la "$APP_BUNDLE/Contents/MacOS/"
          echo "Info.plist CFBundleName:"
          cat "$APP_BUNDLE/Contents/Info.plist" | grep -A1 "CFBundleName" || true
        else
          echo "App bundle not found"
        fi

    - name: Fix app bundle name
      run: |
        # жҹҘжүҫз”ҹжҲҗзҡ„app bundle
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
        echo "Found app bundle: $APP_BUNDLE"

        # йҮҚе‘ҪеҗҚapp bundleд»Һmain.appеҲ°ColorCard.appпјҲж— з©әж јпјҢйҒҝе…ҚзӯҫеҗҚй—®йўҳпјү
        if [ "$APP_BUNDLE" != "dist/ColorCard.app" ]; then
          mv "$APP_BUNDLE" "dist/ColorCard.app"
          APP_BUNDLE="dist/ColorCard.app"
          echo "Renamed app bundle to: ColorCard.app"
        fi

        # дҝ®ж”№Info.plistдёӯзҡ„жҳҫзӨәеҗҚз§°дёәColor Card
        INFO_PLIST="$APP_BUNDLE/Contents/Info.plist"
        if [ -f "$INFO_PLIST" ]; then
          echo "Before modification:"
          cat "$INFO_PLIST" | grep -E "(CFBundleExecutable|CFBundleName|CFBundleDisplayName)" || true

          # дҪҝз”Ёplutilдҝ®ж”№plistпјҲmacOSеҺҹз”ҹе·Ҙе…·пјү
          # жіЁж„ҸпјҡCFBundleExecutableдҝқжҢҒColor CardпјҲдёҺNuitkaз”ҹжҲҗзҡ„еҸҜжү§иЎҢж–Үд»¶еҗҚдёҖиҮҙпјү
          plutil -replace CFBundleName -string "Color Card" "$INFO_PLIST"
          plutil -replace CFBundleDisplayName -string "Color Card" "$INFO_PLIST"

          echo "After modification:"
          cat "$INFO_PLIST" | grep -E "(CFBundleExecutable|CFBundleName|CFBundleDisplayName)" || true
        fi

    - name: Sign App (Ad-hoc)
      run: |
        # дҪҝз”Ё ad-hoc зӯҫеҗҚпјҲдёҚйңҖиҰҒ Apple Developer иҜҒд№Ұпјү
        # иҝҷеҸҜд»Ҙи§ЈеҶі "е·ІжҚҹеқҸ" зҡ„й—®йўҳпјҢдҪҶз”ЁжҲ·д»ҚйңҖеңЁзі»з»ҹеҒҸеҘҪи®ҫзҪ®дёӯе…Ғи®ё
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
        echo "Found app bundle: $APP_BUNDLE"
        codesign --force --deep --sign - --timestamp=none "$APP_BUNDLE"

        # йӘҢиҜҒзӯҫеҗҚ
        codesign -dv --verbose=4 "$APP_BUNDLE"

    - name: Install create-dmg
      run: |
        brew install create-dmg

    - name: Create DMG with custom background
      run: |
        # жҹҘжүҫз”ҹжҲҗзҡ„app bundle
        APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
        APP_NAME=$(basename "$APP_BUNDLE")
        echo "Using app bundle: $APP_BUNDLE (name: $APP_NAME)"

        # жЈҖжҹҘapp bundleзҡ„Info.plist
        echo "=== App Bundle Info.plist ==="
        cat "$APP_BUNDLE/Contents/Info.plist" | grep -E "(CFBundleExecutable|CFBundleName|CFBundleDisplayName)" || true

        # еҲӣе»әдёҙж—¶зӣ®еҪ•з”ЁдәҺ DMG
        mkdir -p dist/dmg

        # еӨҚеҲ¶зӯҫеҗҚеҗҺзҡ„ .app еҲ°дёҙж—¶зӣ®еҪ•
        cp -R "$APP_BUNDLE" dist/dmg/

        # жЈҖжҹҘеӨҚеҲ¶еҗҺзҡ„app bundle
        echo "=== Copied App Bundle Info.plist ==="
        COPIED_APP=$(find dist/dmg -name "*.app" -type d | head -1)
        cat "$COPIED_APP/Contents/Info.plist" | grep -E "(CFBundleExecutable|CFBundleName|CFBundleDisplayName)" || true

        # еӨҚеҲ¶еҗҺйңҖиҰҒйҮҚж–°зӯҫеҗҚпјҲеӨҚеҲ¶дјҡз ҙеқҸзӯҫеҗҚпјү
        echo "Re-signing copied app bundle..."
        codesign --force --deep --sign - --timestamp=none "$COPIED_APP"

        # еҰӮжһңжңүиғҢжҷҜеӣҫзүҮпјҢеӨҚеҲ¶еҲ°дёҙж—¶зӣ®еҪ•
        if [ -f "logo/dmg_background.png" ]; then
          cp logo/dmg_background.png dist/dmg/.background.png
        fi

        # дҪҝз”Ё create-dmg еҲӣе»әеёҰиҮӘе®ҡд№үиғҢжҷҜзҡ„ DMG
        if [ -f "logo/dmg_background.png" ]; then
          create-dmg \
            --volname "ColorCard" \
            --volicon "logo/ColorCard.icns" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --icon "$APP_NAME" 200 250 \
            --icon "Applications" 600 250 \
            --background "logo/dmg_background.png" \
            --app-drop-link 600 250 \
            --no-internet-enable \
            "dist/Color_Card_${{ steps.version.outputs.version }}_mac.dmg" \
            "dist/dmg/$APP_NAME"
        else
          # еҰӮжһңжІЎжңүиғҢжҷҜеӣҫзүҮпјҢдҪҝз”Ёз®ҖжҙҒеёғеұҖ
          create-dmg \
            --volname "ColorCard" \
            --volicon "logo/ColorCard.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME" 150 200 \
            --icon "Applications" 450 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "dist/Color_Card_${{ steps.version.outputs.version }}_mac.dmg" \
            "dist/dmg/$APP_NAME"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-macOS
        path: dist/Color_Card_*_mac.dmg

    - name: Upload Debug Info
      uses: actions/upload-artifact@v4
      with:
        name: Debug-Info
        path: |
          dist/**/*.app/Contents/Info.plist
          dist/dmg/**/*.app/Contents/Info.plist

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/Color_Card_*_mac.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

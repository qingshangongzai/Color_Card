name: Build Windows App with Nuitka

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Restore Nuitka ccache
      id: cache-nuitka-portable
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/_nuitka_cache
        key: ${{ runner.os }}-nuitka-ccache-v1-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-ccache-v1-

    - name: Install ccache
      shell: pwsh
      run: |
        choco install ccache --no-progress -y
        $ccachePath = (Get-Command ccache -ErrorAction SilentlyContinue).Source
        if ($ccachePath) {
          Write-Host "ccache 已安装: $ccachePath"
          "NUITKA_CCACHE_BINARY=$ccachePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        } else {
          Write-Host "::warning::ccache 安装失败，编译将不回退到无缓存模式"
        }

    - name: Configure Nuitka cache directories
      shell: pwsh
      run: |
        $cacheBase = "${{ github.workspace }}/_nuitka_cache"
        "NUITKA_CACHE_DIR=$cacheBase" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "NUITKA_CACHE_DIR_CCACHE=$cacheBase/ccache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "CCACHE_DIR=$cacheBase/ccache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        New-Item -ItemType Directory -Force -Path "$cacheBase/ccache" | Out-Null
        Write-Host "缓存基础目录: $cacheBase"
        Write-Host "缓存命中状态: ${{ steps.cache-nuitka-portable.outputs.cache-hit }}"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka[onefile]
        pip install -r requirements.txt

    - name: Read version
      id: version
      shell: pwsh
      run: |
        $lines = Get-Content version.txt
        $VERSION = $lines[0].Trim()
        $FILE_VERSION = $lines[1].Trim()
        $PRODUCT_VERSION = $lines[2].Trim()
        $COMPANY_NAME = $lines[3].Trim()
        $COPYRIGHT = $lines[4].Trim()
        $APP_NAME = $lines[5].Trim()

        Write-Host "Debug: version content is: '$VERSION'"

        Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "file_version=$FILE_VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "product_version=$PRODUCT_VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "company_name=$COMPANY_NAME"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "copyright=$COPYRIGHT"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "app_name=$APP_NAME"

    - name: Build Portable EXE with Nuitka
      shell: pwsh
      run: |
        python -m nuitka `
          --standalone `
          --onefile `
          --assume-yes-for-downloads `
          --windows-console-mode=disable `
          --windows-icon-from-ico="logo/Color Card_logo.ico" `
          --company-name="${{ steps.version.outputs.company_name }}" `
          --product-name="${{ steps.version.outputs.app_name }}" `
          --file-version="${{ steps.version.outputs.file_version }}" `
          --product-version="${{ steps.version.outputs.product_version }}" `
          --file-description="取色卡 - Color Card (Portable)" `
          --copyright="${{ steps.version.outputs.copyright }}" `
          --include-data-files=version.py=version.py `
          --include-data-dir=color_data=color_data `
          --include-data-dir=core=core `
          --include-data-dir=dialogs=dialogs `
          --include-data-dir=file=file `
          --include-data-dir=locales=locales `
          --include-data-dir=logo=logo `
          --include-data-dir=scenes_data=scenes_data `
          --include-data-dir=ui=ui `
          --include-data-dir=utils=utils `
          --enable-plugin=pyside6 `
          --jobs=4 `
          --output-filename="Color Card Portable" `
          main.py

    - name: Create distribution folder
      shell: pwsh
      run: |
        $distDir = "dist"
        New-Item -ItemType Directory -Force -Path $distDir

        $version = "${{ steps.version.outputs.version }}"
        $portableName = "Color_Card_${version}_x64.exe"

        Copy-Item "Color Card Portable.exe" -Destination "$distDir\$portableName"

        Write-Host "Portable distribution contents:"
        Get-ChildItem -Path $distDir

    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-Windows-Portable
        path: dist/*.exe

  build-installer:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Restore Nuitka ccache
      id: cache-nuitka-installer
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/_nuitka_cache
        key: ${{ runner.os }}-nuitka-ccache-v1-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-ccache-v1-

    - name: Install ccache
      shell: pwsh
      run: |
        choco install ccache --no-progress -y
        $ccachePath = (Get-Command ccache -ErrorAction SilentlyContinue).Source
        if ($ccachePath) {
          Write-Host "ccache 已安装: $ccachePath"
          "NUITKA_CCACHE_BINARY=$ccachePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        } else {
          Write-Host "::warning::ccache 安装失败，编译将回退到无缓存模式"
        }

    - name: Configure Nuitka cache directories
      shell: pwsh
      run: |
        $cacheBase = "${{ github.workspace }}/_nuitka_cache"
        "NUITKA_CACHE_DIR=$cacheBase" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "NUITKA_CACHE_DIR_CCACHE=$cacheBase/ccache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "CCACHE_DIR=$cacheBase/ccache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        New-Item -ItemType Directory -Force -Path "$cacheBase/ccache" | Out-Null
        Write-Host "缓存基础目录: $cacheBase"
        Write-Host "缓存命中状态: ${{ steps.cache-nuitka-installer.outputs.cache-hit }}"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka[onefile]
        pip install -r requirements.txt

    - name: Read version
      id: version
      shell: pwsh
      run: |
        $lines = Get-Content version.txt
        $VERSION = $lines[0].Trim()
        $FILE_VERSION = $lines[1].Trim()
        $PRODUCT_VERSION = $lines[2].Trim()
        $COMPANY_NAME = $lines[3].Trim()
        $COPYRIGHT = $lines[4].Trim()
        $APP_NAME = $lines[5].Trim()

        Write-Host "Debug: version content is: '$VERSION'"

        Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "file_version=$FILE_VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "product_version=$PRODUCT_VERSION"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "company_name=$COMPANY_NAME"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "copyright=$COPYRIGHT"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "app_name=$APP_NAME"

    - name: Build Installer EXE with Nuitka
      shell: pwsh
      run: |
        python -m nuitka `
          --standalone `
          --onefile `
          --assume-yes-for-downloads `
          --windows-console-mode=disable `
          --windows-icon-from-ico="logo/Color Card_logo.ico" `
          --company-name="${{ steps.version.outputs.company_name }}" `
          --product-name="${{ steps.version.outputs.app_name }}" `
          --file-version="${{ steps.version.outputs.file_version }}" `
          --product-version="${{ steps.version.outputs.product_version }}" `
          --file-description="取色卡 - Color Card (Installer)" `
          --copyright="${{ steps.version.outputs.copyright }}" `
          --include-data-files=version.py=version.py `
          --include-data-dir=color_data=color_data `
          --include-data-dir=core=core `
          --include-data-dir=dialogs=dialogs `
          --include-data-dir=file=file `
          --include-data-dir=locales=locales `
          --include-data-dir=logo=logo `
          --include-data-dir=scenes_data=scenes_data `
          --include-data-dir=ui=ui `
          --include-data-dir=utils=utils `
          --include-data-dir=installer=installer `
          --enable-plugin=pyside6 `
          --jobs=4 `
          --output-filename="ColorCard" `
          installer/main.py

    - name: Create distribution folder
      shell: pwsh
      run: |
        $distDir = "dist"
        New-Item -ItemType Directory -Force -Path $distDir

        $version = "${{ steps.version.outputs.version }}"
        $installerName = "Color_Card_${version}_x64_Setup.exe"

        Copy-Item "ColorCard.exe" -Destination "$distDir\$installerName"

        Write-Host "Installer distribution contents:"
        Get-ChildItem -Path $distDir

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: ColorCard-Windows-Installer
        path: dist/*.exe
